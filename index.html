<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f1319;
            --card-bg: #181f29;
            --card-border: #232c39;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --text-white: #ffffff;
            --text-muted: #8e9bae;
            --text-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #05070a;
            color: var(--text-white);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-color);
            padding: 16px;
            padding-bottom: 90px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
        }

        .bell-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-white);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Подзаголовок */
        .subtitle-container {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .highlight {
            color: var(--text-blue);
            font-weight: 600;
        }

        /* Общие стили карточек */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 12px;
        }

        /* Профиль */
        .profile-header {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .avatar img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
        }

        .username {
            font-size: 18px;
            font-weight: 800;
            line-height: 1.2;
        }

        .user-handle {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
            margin-bottom: 8px;
        }

        .balance-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .balance-amount {
            color: #fff;
            font-size: 13px;
            margin-left: 4px;
        }

        .verification-box {
            text-align: center;
        }

        .verification-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        /* Кнопки */
        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary {
            background-color: var(--accent-green);
            color: #000;
            font-weight: 700;
        }

        .btn-full {
            width: 100%;
        }

        /* История платежей */
        .payment-history {
            width: 100%;
            text-align: center;
            color: var(--text-white);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* Сетка кнопок */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            color: var(--text-white);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }

        /* Код сделки */
        .card-caption {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .deal-description {
            font-size: 12px;
            color: var(--text-muted);
            margin: 8px 0 12px 0;
            line-height: 1.4;
        }

        .deal-input-group {
            display: flex;
            gap: 8px;
        }

        .deal-input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px;
            color: #fff;
        }

        /* Навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background-color: rgba(24, 31, 41, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active {
            color: var(--text-white);
        }

        .nav-item i {
            font-size: 18px;
        }

        .create-btn-wrapper {
            position: relative;
            top: -15px;
        }

        .create-btn {
            width: 44px;
            height: 44px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1 class="header-title">Мой проект</h1>
            <button class="bell-btn" aria-label="Уведомления">
                <i class="fa-regular fa-bell"></i>
            </button>
        </header>

        <div class="subtitle-container">
            <p>Маркетплейс игровых товаров и услуг · <span class="highlight">безопасная сделка</span> в Telegram</p>
        </div>

        <main class="content">
            <section class="card profile-card">
                <div class="profile-header">
                    <div class="avatar">
                        <img src="https://via.placeholder.com/60" alt="Аватар">
                    </div>
                    <div class="user-info">
                        <h2 class="username">Vladislav Sk11lovsky</h2>
                        <span class="user-handle">@mvdsk11ll</span>
                        <div class="balance-badge">
                            БАЛАНС <span class="balance-amount">0,00 ₽</span>
                        </div>
                    </div>
                </div>

                <div class="verification-box">
                    <span class="verification-label">Верификация в боте</span>
                    <button class="btn btn-primary btn-full">Верифицировать</button>
                </div>
            </section>

            <button class="card btn-card payment-history">
                <span>·</span> История платежей <span>·</span>
            </button>

            <div class="action-grid">
                <button class="card btn-action">Пополнить баланс</button>
                <button class="card btn-action">Вывести деньги</button>
            </div>

            <section class="card deal-card">
                <span class="card-caption">КОД СДЕЛКИ</span>
                <p class="deal-description">
                    Продавец прислал код — введите его, чтобы открыть сделку и оплатить.
                </p>
                <div class="deal-input-group">
                    <input type="text" placeholder="Введите код..." class="deal-input">
                    <button class="btn btn-primary">Открыть</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span>Профиль</span>
            </button>
            <button class="nav-item">
                <i class="fa-regular fa-comment"></i>
                <span>Чаты</span>
            </button>
            <button class="nav-item create-btn-wrapper">
                <div class="create-btn">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <span>Создать</span>
            </button>
            <button class="nav-item">
                <i class="fa-regular fa-wallet"></i>
                <span>Кошелёк</span>
            </button>
            <button class="nav-item">
                <i class="fa-regular fa-circle-question"></i>
                <span>Помощь</span>
            </button>
        </nav>
    </div>

</body>
</html>
