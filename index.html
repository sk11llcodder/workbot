<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Playerok Mini</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #14161A;
      color: #EBECF0;
      padding: 16px;
      padding-bottom: 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }
    .item {
      background: #1E1F26;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #282933;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .item svg {
      width: 40px;
      height: 40px;
      fill: #A4A8B2;
    }
    .item span {
      font-size: 11px;
      color: #A4A8B2;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<div class="grid">
  <!-- 1. Standoff 2 -->
  <div class="item">
    <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#A4A8B2" stroke-width="2"/><path d="M16 4C9.37258 4 4 9.37258 4 16C4 22.6274 9.37258 28 16 28C22.6274 28 28 22.6274 28 16C28 9.37258 22.6274 4 16 4ZM16 8L20 12L16 16L12 12L16 8ZM8 16L12 20L8 24L4 20L8 16ZM24 16L20 20L24 24L28 20L24 16ZM16 20L20 24L16 28L12 24L16 20Z" fill="#A4A8B2"/></svg>
    <span>Standoff 2</span>
  </div>

  <!-- 2. Roblox -->
  <div class="item">

    <span>Roblox</span>
  </div>

  <!-- 3. PUBG Mobile -->

    <span>Brawl Stars</span>

  <!-- 5. PlayStation -->

    <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#A4A8B2" stroke-width="2"/><path d="M10 8L22 8L22 16L10 16L10 8Z" fill="#A4A8B2"/><path d="M10 20L22 20L22 24L10 24L10 20Z" fill="#A4A8B2"/></svg>

</body>
