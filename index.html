<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Playerok WebApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== ПЕРЕМЕННЫЕ И ОСНОВНЫЕ СТИЛИ ==================== */
        :root {
            --bg-main: #0b0e14;
            --card-bg: #161c24;
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #ffffff;
            --text2: #94a3b8;
            --text3: #64748b;
            --tabbar-bg: rgba(22, 28, 36, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==================== ФОНОВЫЕ ЭФФЕКТЫ (COSMOS / AMBIENT) ==================== */
        .app-fx, .app-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .app-ambient__orb--a {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(50px);
        }

        /* ==================== ОСНОВНОЙ КОНТЕЙНЕР ==================== */
        #main {
            width: 100%;
            max-width: 440px;
            padding: 16px;
            padding-top: 60px;
            padding-bottom: 90px;
            position: relative;
            z-index: 1;
        }

        /* Шапка */
        .top-header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            height: 54px;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
        }

        .app-logo-word {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .btn-notif {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-notif svg {
            width: 18px;
            height: 18px;
        }

        /* Подзаголовок */
        .home-tagline {
            font-size: 13px;
            color: var(--text2);
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .home-tagline__accent {
            color: #60a5fa;
            font-weight: 500;
        }

        /* Карточки iOS */
        .ios-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .ios-row {
            display: flex;
            gap: 12px;
        }

        .avatar img {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            object-fit: cover;
        }

        .home-profile-balance {
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            padding: 4px 10px;
            border-radius: 8px;
        }

        .home-profile-balance__label {
            font-size: 11px;
            color: var(--accent-green);
            font-weight: 700;
            text-transform: uppercase;
        }

        .home-profile-balance__value {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .verify-chip {
            display: block;
            font-size: 12px;
            color: var(--text2);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
        }

        /* Кнопки */
        .btn-ios {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-blue {
            background-color: var(--accent-blue);
            color: #fff;
        }

        .btn-green {
            background-color: var(--accent-green);
            color: #000;
            font-weight: 700;
        }

        .btn-gray {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
        }

        .btn-red {
            background-color: var(--accent-red);
            color: #fff;
        }

        /* Сетки (Grid) */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* Инпуты */
        .ios-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .ios-input:focus {
            border-color: var(--accent-blue);
        }

        /* Тексты подсказок */
        .hint-text {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.4;
        }

        .home-note {
            font-size: 11px;
            color: var(--text3);
            margin-top: 14px;
            text-align: center;
            line-height: 1.4;
        }

        /* Таббар (Нижнее меню) */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 440px;
            height: 64px;
            background: var(--tabbar-bg);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: 8px;
        }

        .tab {
            background: none;
            border: none;
            color: var(--text3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
        }

        .tab.on {
            color: #fff;
        }

        .tab svg {
            width: 20px;
            height: 20px;
        }

        .tab-create {
            position: relative;
            top: -12px;
            background: var(--accent-green);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        .tab-create__plus {
            font-size: 24px;
            color: #000;
            font-weight: 600;
            line-height: 1;
        }

        /* Вспомогательные классы управления панелями */
        .panel {
            display: none;
        }

        .panel.on {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* Всплывающие шторки (Sheets) */
        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .sheet-overlay.active {
            display: flex;
        }

        .sheet {
            background: var(--card-bg);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            border-top: 1px solid var(--card-border);
        }

        .sheet .grab {
            width: 36px;
            height: 4px;
            background: var(--card-border);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .sheet-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="ui-ready">

    </body>
</html>
