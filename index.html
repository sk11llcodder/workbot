<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --app-bg-color: #12141a; /* Глубокий темный фон */
            --app-card-bg: #1a1e26;  /* Цвет карточек */
            --app-accent-color: #03dac6; /* Основной акцентный цвет */
            --app-text-main: #e0e0e0; /* Основной цвет текста */
            --app-text-secondary: #a0a0a0; /* Второстепенный текст */
            --app-button-bg: #2d3340; /* Фон кнопок */
            --app-button-hover: #3d4554;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: var(--app-bg-color);
            color: var(--app-text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 420px; /* Ограничение ширины для мобильных */
        }

        /* Блок заголовка */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0;
        }

        /* Общие стили для карточек */
        .card {
            background-color: var(--app-card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Блок информации о пользователе и балансе */
        .account-card {
            text-align: center;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
        }

        .avatar-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #334155;
            margin-bottom: 8px;
        }

        .username {
            font-size: 14px;
            color: var(--app-text-secondary);
            margin: 0;
        }

        .balance-section {
            margin-bottom: 16px;
        }

        .balance-label {
            font-size: 14px;
            color: var(--app-text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .balance-value {
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }

        /* Стили кнопок */
        .action-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: var(--app-accent-color);
            color: #121212; /* Темный текст на светлом фоне */
        }

        .btn-primary:active {
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: var(--app-button-bg);
            color: var(--app-text-main);
        }

        .btn-secondary:hover {
            background-color: var(--app-button-hover);
        }

        /* Блок действий с балансом */
        .balance-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        /* Блок ввода кода сделки */
        .deal-code-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-code {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #2d3340; /* Чуть светлее фона карточки */
            color: var(--app-text-main);
            font-size: 16px;
            box-sizing: border-box; /* Чтобы padding не увеличивал ширину */
        }

        .input-code::placeholder {
            color: #555555;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="app-header">
            <h1 class="header-title">Сервис Сделок</h1>
        </div>

        <div class="card account-card">
            <div class="profile-section">
                <div class="avatar-circle"></div> <p class="username">@testuser</p>
            </div>
            
            <div class="balance-section">
                <p class="balance-label">Доступно</p>
                <h2 class="balance-value">0,00 ₽</h2>
            </div>
            
            <button class="action-button btn-primary">Пополнить</button>
        </div>

        <div class="balance-actions">
            <button class="action-button btn-secondary">История</button>
            <button class="action-button btn-secondary">Вывести</button>
        </div>

        <div class="card deal-code-card">
            <p style="margin: 0; color: var(--app-text-secondary); font-size: 14px;">Введите код сделки</p>
            <input type="text" class="input-code" placeholder="КОД ИЗ 6 СИМВОЛОВ">
            <button class="action-button btn-primary">Продолжить</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    </script>
</body>
</html>
