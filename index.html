<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>Playerok Mini</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #14161A;
      color: #EBECF0;
      padding: 16px;
      padding-bottom: 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }
    .item {
      background: #1E1F26;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #282933;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .item:active { transform: scale(0.95); }
    .item img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: contain;
      background: rgba(255,255,255,0.03);
    }
    .item span {
      font-size: 11px;
      color: #A4A8B2;
      white-space: nowrap;
      font-weight: 500;
    }
    .header {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #2663F0, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .item img { width: 38px; height: 38px; }
    }
  </style>
</head>
